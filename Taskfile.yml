version: 3

dotenv: [".env.local"]

env:
  DEFAULT_DOCKER_IMAGE: webapp

tasks:
  ## development tasks ##
  init:
    desc: >
      Initialize vite project for development |  Usage: task init (i) [-- hard]
    aliases: [i]
    platforms: [linux]
    cmds:
      - >
        {{if eq .CLI_ARGS "hard"}}
          rm -rf bun.lock .swc
        {{end}}
      - rm -rf node_modules
      - bun install
  ## ----------------- ##

  ## deployment tasks ##
  docker:build:
    desc: >
      Build docker images for deployment according to compose.yml definition |  Usage:
      task docker:build (d:b) [
        -- push;
        DOCKER_TARGET=test/final, default final;
        DOCKER_IMAGE=<string>, default {{.DEFAULT_DOCKER_IMAGE}};
        DOCKER_TAG=<MINOR.MAJOR.PATCH>, default latest;
      ]
    summary: |
      Usage: task docker:build (d:b) [
        -- push;
        DOCKER_TARGET=test/final, default final;
        DOCKER_IMAGE=<string>, default {{.DEFAULT_DOCKER_IMAGE}};
        DOCKER_TAG=<MINOR.MAJOR.PATCH>, default latest;
      ]

      Build docker image for deployment

      Optional arguments:
        push            Uploads the image to the registry instead of keep it locally

      Optional variables:
        DOCKER_TARGET   Defines target for docker image stage
        DOCKER_IMAGE    Name of the project image which will be run in container
        DOCKER_TAG      Defines the tag of the resulting image representing the version

      Examples:
        task docker:build
        task docker:build -- push
        task docker:build DOCKER_TARGET=test
        task docker:build DOCKER_IMAGE=custom_user/custom_registry/custom_repository
        task docker:build DOCKER_TAG=1.2.3
    aliases: [d:b]
    platforms: [linux]
    requires:
      vars:
        - VITE_DEBUG
        # -------------- #
        - VITE_NAME
        - VITE_DESCRIPTION
        - VITE_HTTP_PORT
        - VITE_HTTPS_PORT
    # prettier-ignore
    cmd: >
      docker buildx inspect containerd > /dev/null 2> /dev/null ||
      docker buildx create --name containerd --driver docker-container --bootstrap &&
      echo "BuildKit Driver: $(docker buildx inspect --builder containerd | \
        awk -F': *' '/^Driver:/ {print $2}')" &&
      docker build
      --tag {{.DOCKER_IMAGE | default "{{.DEFAULT_DOCKER_IMAGE}}"}}:{{.DOCKER_TAG | default "latest"}}
      --target {{.DOCKER_TARGET | default "final"}}
      --build-arg DOCKER_TAG={{.DOCKER_TAG | default "latest"}}
      --build-arg VITE_DEBUG={{.VITE_DEBUG}}
      --build-arg VITE_NAME={{.VITE_NAME}}
      --build-arg VITE_DESCRIPTION={{.VITE_DESCRIPTION}}
      --build-arg VITE_HTTP_PORT={{.VITE_HTTP_PORT}}
      --build-arg VITE_HTTPS_PORT={{.VITE_HTTPS_PORT}}
      --builder containerd
      {{if and (ne .DOCKER_TARGET "final") (not (or (eq .DOCKER_TARGET nil) (eq .DOCKER_TARGET "")))}}
      --output type=cacheonly
      {{else if eq .CLI_ARGS "push"}}
      --push
      {{else}}
      --load
      {{end}}
      .

  docker:compose:
    desc: >
      Create and start builded docker images containers according to compose.yml
      definition |  Usage: task docker:compose (d:c) [
        -- attach; -- down;
        DOCKER_IMAGE=<string>, default {{.DEFAULT_DOCKER_IMAGE}};
        DOCKER_TAG=<MINOR.MAJOR.PATCH>, default latest;
      ]
    summary: |
      Usage: task docker:compose (d:c) [
        -- attach; -- down;
        DOCKER_IMAGE=<string>, default {{.DEFAULT_DOCKER_IMAGE}};
        DOCKER_TAG=<MINOR.MAJOR.PATCH>, default latest;
      ]

      Run builded docker image in container

      Optional arguments:
        attach          Attaches logs of all docker containers when they started
        down            Stop and remove running containers and their associated networks       

      Optional variables:
        DOCKER_IMAGE    Name of the project image which will be run in container
        DOCKER_TAG      Defines the tag of the image used to run in the container

      Examples:
        task docker:compose
        task docker:compose -- attach      
        task docker:compose -- down
        task docker:compose DOCKER_IMAGE=custom_user/custom_registry/custom_repository
        task docker:compose DOCKER_TAG=1.2.3
    aliases: [d:c]
    platforms: [linux]
    env:
      DOCKER_IMAGE: "{{.DOCKER_IMAGE | default .DEFAULT_DOCKER_IMAGE}}" # pass taskfile variable to environment
      DOCKER_TAG: '{{.DOCKER_TAG | default "latest"}}' # pass taskfile variable to environment
    cmd: |
      {{if ne .GITLAB_CI "true"}}
       # Here you should export environment variables mapped as paths in docker volume
       export VITE_SSL_CERT_PATH=$(realpath ${VITE_SSL_CERT_PATH})
       export VITE_SSL_KEY_PATH=$(realpath ${VITE_SSL_KEY_PATH})
      {{end}}
      docker volume create webapp-nginx-data
      {{if eq .GITLAB_CI "true"}}
        sh -c 'docker compose --profile prod pull || (docker compose --profile prod down; exit 1)'
      {{end}}
      {{if eq .CLI_ARGS ""}}
        sh -c 'docker compose --profile prod up -d --no-build --force-recreate || (docker compose --profile prod down; exit 1)'
      {{else if eq .CLI_ARGS "attach"}}
        sh -c 'docker compose --profile prod up --no-build --force-recreate || (docker compose --profile prod down; exit 1)'
      {{else if eq .CLI_ARGS "down"}}
        docker compose --profile prod down --remove-orphans
      {{else}}
        echo 'Invalid argument: "{{.CLI_ARGS}}". Consult task summary'
      {{end}}
  ## ---------------- ##
